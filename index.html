<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>3D Photo Demo</title>
<style>
  html,body{margin:0;height:100%;background:#050505;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;}
  #wrap{height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
  canvas{max-width:100vw;max-height:100vh;width:auto;height:auto;display:block;touch-action:none;}
  #panel{position:fixed;left:16px;right:16px;bottom:18px;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px;box-sizing:border-box;text-align:center;}
  button{font-size:17px;padding:12px 18px;border-radius:999px;border:0;background:white;color:black;font-weight:700;}
  .small{opacity:.82;font-size:13px;margin-top:8px;line-height:1.45;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="panel">
  <button id="enable">Tap to enable motion</button>
  <div class="small">iPhoneを左右・上下に傾けると写真が奥行きっぽく動きます。PCではマウスを動かしてください。</div>
</div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const photo=new Image(), depth=new Image();
photo.src='photo.jpg'; depth.src='depth.png';
let W=0,H=0, dx=0,dy=0, targetX=0,targetY=0, ready=0;
function loaded(){ if(++ready<2)return; W=photo.naturalWidth; H=photo.naturalHeight; canvas.width=W; canvas.height=H; requestAnimationFrame(draw); }
photo.onload=loaded; depth.onload=loaded;
const off=document.createElement('canvas'), octx=off.getContext('2d',{willReadFrequently:true});
function getDepthData(){ off.width=W; off.height=H; octx.drawImage(depth,0,0,W,H); return octx.getImageData(0,0,W,H).data; }
let depthData=null;
function draw(){
  if(!W){requestAnimationFrame(draw); return;}
  if(!depthData) depthData=getDepthData();
  dx += (targetX-dx)*0.08; dy += (targetY-dy)*0.08;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(-dx*0.25,-dy*0.25);
  ctx.scale(1.03,1.03);
  ctx.drawImage(photo,-W*.015,-H*.015,W,H);
  ctx.restore();
  const step=6;
  for(let y=0;y<H;y+=step){
    // read center-ish depth for strip
    let p=((Math.min(H-1,y+step/2)|0)*W + (W/2|0))*4;
    let v=depthData[p]/255; // front brighter
    let shiftX=dx*(v-.45)*1.7;
    let shiftY=dy*(v-.45)*1.7;
    ctx.drawImage(photo,0,y,W,step,shiftX,y+shiftY,W,step);
  }
  requestAnimationFrame(draw);
}
function setTilt(x,y){ targetX=Math.max(-28,Math.min(28,x)); targetY=Math.max(-22,Math.min(22,y)); }
window.addEventListener('mousemove',e=>{setTilt((e.clientX/innerWidth-.5)*55,(e.clientY/innerHeight-.5)*42)});
document.getElementById('enable').onclick=async()=>{
  try{
    if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
      const r=await DeviceOrientationEvent.requestPermission();
      if(r!=='granted') return;
    }
    window.addEventListener('deviceorientation',e=>{ setTilt((e.gamma||0)*1.2,(e.beta||0-45)*0.55); }, true);
    document.getElementById('panel').style.display='none';
  }catch(err){ alert('Motion permission failed. Safariで開いてください。'); }
};
</script>
</body>
</html>
